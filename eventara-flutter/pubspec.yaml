name: eventara
description: Eventara — Event Ticket Booking Mobile App
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0                  # Declarative routing with route guards

  # State Management
  flutter_riverpod: ^2.5.1            # Core Riverpod
  riverpod_annotation: ^2.6.1         # Annotation-based provider generation
  hooks_riverpod: ^2.5.1              # useProvider hooks (optional)

  # Network
  dio: ^5.4.3                         # HTTP client with interceptors
  pretty_dio_logger: ^1.3.1           # Dev-only request logging

  # Storage
  # flutter_secure_storage: ^9.0.0    # JWT storage (Keychain/Keystore) - disabled for web builds due to Windows space-in-path issue
  shared_preferences: ^2.2.3          # Non-sensitive preferences

  # Code Generation / Serialization
  freezed_annotation: ^2.4.1          # Immutable data classes
  json_annotation: ^4.9.0             # JSON serialization annotations

  # QR Code
  qr_flutter: ^4.1.0                  # QR code display widget
  # UI
  flutter_svg: ^2.0.10+1              # SVG assets
  shimmer: ^3.0.0                     # Skeleton loading effect
  intl: ^0.19.0                       # Date/number formatting
  flutter_dotenv: ^5.1.0              # .env file loader

  # Misc
  equatable: ^2.0.5                   # Value equality helpers

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generators
  build_runner: ^2.4.9
  freezed: ^2.5.8
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.4

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
