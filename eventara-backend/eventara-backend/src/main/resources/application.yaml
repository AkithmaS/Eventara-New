spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Profile-specific files are loaded automatically by Spring Boot.
  # application-local.yaml holds real local values (gitignored).
  # Production (Render/Railway) sets DB_URL, DB_USERNAME, DB_PASSWORD,
  # JWT_SECRET, JWT_EXPIRATION as real environment variables — no file needed.
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 60000
      connection-timeout: 30000
      keepalive-time: 30000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        "[format_sql]": true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
